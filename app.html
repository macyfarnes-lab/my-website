<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Coconut Catch 🌴</title>

<!-- Bootstrap (for buttons) -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Your shared CSS -->
<link rel="stylesheet" href="styles.css">

<style>
/* GAME CONTAINER */
.game-wrapper {
    text-align: center;
}

/* CANVAS STYLING */
canvas {
    display: block;
    margin: 20px auto;
    border: 3px solid white;
    border-radius: 12px;
    background: linear-gradient(#87CEEB 65%, #F4A460 65%);
}

/* SCORE TEXT */
#score {
    color: white;
    font-size: 18px;
}
</style>

</head>

<body>

<div class="hero">

    <div class="glass-card scratch-card game-wrapper">

        <!-- NAV BUTTONS -->
        <div class="mt-2">
            <a href="../index.html" class="btn btn-light btn-custom">Home</a>
            <a href="resume.html" class="btn btn-success btn-custom">Resume</a>
            <a href="scratch.html" class="btn btn-primary btn-custom">Travel Page</a>
            <a href="tableau.html" class="btn btn-info btn-custom">Tableau</a>
        </div>

        <!-- TITLE -->
        <h1 class="mt-4">🏄‍♀️ Coconut Catch</h1>
        <p id="score">Score: 0 | Lives: 3 | Level: 1</p>

        <!-- GAME -->
        <canvas id="gameCanvas" width="500" height="600"></canvas>

    </div>

</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// PLAYER
let player = {
    x: 210,
    y: 520,
    width: 60,
    height: 60,
    speed: 7
};

let coconuts = [];
let particles = [];
let score = 0;
let lives = 3;
let level = 1;
let gameOver = false;
let waveOffset = 0;
let spawnRate = 1200;
let spawnInterval;

// CONTROLS
let keys = {};
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

// RESTART
document.addEventListener("keydown", e => {
    if (gameOver && e.key === " ") restartGame();
});

canvas.addEventListener("click", () => {
    if (gameOver) restartGame();
});

function restartGame() {
    coconuts = [];
    particles = [];
    score = 0;
    lives = 3;
    level = 1;
    spawnRate = 1200;
    gameOver = false;
    startSpawning();
}

// PALM TREE
function drawPalmTree() {
    ctx.fillStyle = "#8B5A2B";
    ctx.fillRect(40, 100, 30, 500);

    for (let i = -3; i <= 3; i++) {
        let baseX = 55;
        let baseY = 120;
        let angle = i * 0.4;

        ctx.beginPath();
        ctx.moveTo(baseX, baseY);

        ctx.quadraticCurveTo(
            baseX + Math.sin(angle) * 60,
            baseY - 80,
            baseX + Math.sin(angle) * 120,
            baseY + Math.cos(angle) * 40
        );

        ctx.strokeStyle = "#1f7a1f";
        ctx.lineWidth = 6;
        ctx.stroke();
    }
}

// WAVES
function drawWaves() {
    waveOffset += 0.05;

    ctx.fillStyle = "#1E90FF";
    ctx.beginPath();

    for (let x = 0; x < canvas.width; x++) {
        let y = 420 + Math.sin(x * 0.05 + waveOffset) * 10;
        ctx.lineTo(x, y);
    }

    ctx.lineTo(canvas.width, canvas.height);
    ctx.lineTo(0, canvas.height);
    ctx.fill();
}

// COCONUT
function drawCoconut(c) {
    ctx.fillStyle = "#6b3e26";
    ctx.beginPath();
    ctx.arc(c.x, c.y, c.size, 0, Math.PI * 2);
    ctx.fill();
}

// PARTICLES
function createBreakEffect(x, y) {
    for (let i = 0; i < 6; i++) {
        particles.push({
            x, y,
            dx: (Math.random() - 0.5) * 6,
            dy: (Math.random() - 0.5) * 6,
            life: 30
        });
    }
}

function drawParticles() {
    particles.forEach((p, index) => {
        p.x += p.dx;
        p.y += p.dy;
        p.life--;

        ctx.fillStyle = "white";
        ctx.fillRect(p.x, p.y, 4, 4);

        if (p.life <= 0) particles.splice(index, 1);
    });
}

// SPAWN
function startSpawning() {
    clearInterval(spawnInterval);

    spawnInterval = setInterval(() => {
        coconuts.push({
            x: 70 + Math.random() * 120,
            y: 120,
            size: 15,
            speed: 3 + level
        });
    }, spawnRate);
}

// PLAYER
function drawPlayer() {
    ctx.font = "50px Arial";
    ctx.fillText("🏄‍♀️", player.x, player.y);
}

// UPDATE
function updateCoconuts() {
    coconuts.forEach((c, index) => {
        c.y += c.speed;

        if (
            c.y > player.y &&
            c.x > player.x &&
            c.x < player.x + player.width
        ) {
            createBreakEffect(c.x, c.y);
            coconuts.splice(index, 1);
            score++;
        }

        if (c.y > canvas.height) {
            coconuts.splice(index, 1);
            lives--;
        }
    });
}

// MOVE
function movePlayer() {
    if (keys["ArrowLeft"] && player.x > 0) player.x -= player.speed;
    if (keys["ArrowRight"] && player.x < canvas.width - player.width)
        player.x += player.speed;
}

// LEVEL
function updateLevel() {
    let newLevel = Math.floor(score / 10) + 1;

    if (newLevel !== level) {
        level = newLevel;
        spawnRate = Math.max(400, spawnRate - 150);
        startSpawning();
    }
}

// DRAW LOOP
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawPalmTree();
    drawWaves();

    coconuts.forEach(drawCoconut);
    drawParticles();
    drawPlayer();

    updateLevel();

    document.getElementById("score").innerText =
        "Score: " + score +
        " | Lives: " + lives +
        " | Level: " + level;

    if (lives <= 0) gameOver = true;

    if (gameOver) {
        ctx.fillStyle = "white";
        ctx.font = "40px Arial";
        ctx.fillText("GAME OVER", 120, 280);

        ctx.font = "18px Arial";
        ctx.fillText("Press SPACE or Click to Restart", 110, 320);
    }

    requestAnimationFrame(draw);
}

// LOOPS
setInterval(updateCoconuts, 20);
setInterval(movePlayer, 20);
startSpawning();
draw();
</script>

</body>
</html>
